<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Daily Agent" />
  <title>Daily Agent</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0a0a0a;
      color: #f0f0f0;
      min-height: 100dvh;
      padding: env(safe-area-inset-top, 20px) 16px env(safe-area-inset-bottom, 20px);
    }

    header {
      padding: 20px 0 8px;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
    }

    .date {
      font-size: 13px;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    h1 {
      font-size: 26px;
      font-weight: 700;
      letter-spacing: -0.5px;
      margin-top: 2px;
    }

    .edit-toggle {
      margin-top: 10px;
      background: none;
      border: 1px solid #3a3a3c;
      color: #888;
      font-size: 13px;
      font-weight: 500;
      padding: 5px 12px;
      border-radius: 99px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    .edit-toggle.active {
      border-color: #0a84ff;
      color: #0a84ff;
    }

    .progress-bar-wrap {
      background: #1c1c1e;
      border-radius: 99px;
      height: 6px;
      margin: 16px 0 24px;
      overflow: hidden;
    }

    .progress-bar {
      height: 100%;
      background: linear-gradient(90deg, #30d158, #34c759);
      border-radius: 99px;
      transition: width 0.4s ease;
    }

    .progress-label {
      font-size: 12px;
      color: #666;
      text-align: right;
      margin-top: -20px;
      margin-bottom: 20px;
    }

    .section { margin-bottom: 20px; }

    .section-title {
      font-size: 11px;
      font-weight: 600;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 8px;
      padding-left: 4px;
    }

    .card {
      background: #1c1c1e;
      border-radius: 14px;
      overflow: hidden;
    }

    .item {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 16px;
      border-bottom: 1px solid #2c2c2e;
      cursor: pointer;
      transition: background 0.15s;
      -webkit-tap-highlight-color: transparent;
    }

    .item:last-child { border-bottom: none; }
    .item:active { background: #2c2c2e; }

    .item.done .label {
      text-decoration: line-through;
      color: #555;
    }

    .checkbox {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      border: 2px solid #3a3a3c;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }

    .item.done .checkbox {
      background: #30d158;
      border-color: #30d158;
    }

    .checkmark {
      display: none;
      color: white;
      font-size: 13px;
      font-weight: 700;
    }

    .item.done .checkmark { display: block; }

    .label {
      font-size: 15px;
      line-height: 1.3;
      color: #f0f0f0;
      flex: 1;
      transition: color 0.2s;
    }

    .delete-btn {
      display: none;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: #ff453a;
      border: none;
      color: white;
      font-size: 16px;
      line-height: 1;
      cursor: pointer;
      flex-shrink: 0;
      align-items: center;
      justify-content: center;
      -webkit-tap-highlight-color: transparent;
    }

    .edit-mode .delete-btn { display: flex; }

    .edit-btn-label {
      display: none;
      font-size: 13px;
      color: #0a84ff;
      flex-shrink: 0;
      padding: 2px 0;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    .edit-mode .edit-btn-label { display: block; }

    .add-item-row {
      display: none;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      cursor: pointer;
      color: #0a84ff;
      font-size: 15px;
      border-top: 1px solid #2c2c2e;
      -webkit-tap-highlight-color: transparent;
    }

    .edit-mode .add-item-row { display: flex; }
    .add-item-row:active { opacity: 0.6; }

    .lock-badge {
      display: none;
      font-size: 11px;
      color: #555;
      margin-left: 6px;
    }

    .edit-mode .lock-badge { display: inline; }

    .reset-btn {
      display: block;
      width: 100%;
      margin-top: 28px;
      padding: 14px;
      background: #1c1c1e;
      color: #ff453a;
      font-size: 15px;
      font-weight: 500;
      border: none;
      border-radius: 14px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    .reset-btn:active { opacity: 0.7; }

    .chat-btn {
      display: block;
      width: 100%;
      margin-top: 12px;
      padding: 14px;
      background: #1a3a2a;
      color: #30d158;
      font-size: 15px;
      font-weight: 600;
      border: none;
      border-radius: 14px;
      cursor: pointer;
      text-align: center;
      text-decoration: none;
      -webkit-tap-highlight-color: transparent;
    }

    .chat-btn:active { opacity: 0.7; }
  </style>
</head>
<body>

<header>
  <div>
    <div class="date" id="date-label"></div>
    <h1>Daily Agent</h1>
  </div>
  <div style="text-align:right;">
    <button class="edit-toggle" id="edit-toggle" onclick="toggleEditMode()">Edit</button>
  </div>
</header>

<div class="progress-bar-wrap">
  <div class="progress-bar" id="progress-bar" style="width:0%"></div>
</div>
<div class="progress-label" id="progress-label">0 / 0 done</div>

<div id="checklist"></div>

<a class="chat-btn" href="https://claude.ai/new" target="_blank">&#x1F4AC; Open Claude to Plan My Day</a>
<button class="reset-btn" onclick="resetDay()">Reset today's checklist</button>

<script>
  // 0=Sun,1=Mon,2=Tue,3=Wed,4=Thu,5=Fri,6=Sat
  const GYM_SCHEDULE = {
    0: "Shoulders & Arms",
    1: "Push",
    2: "Legs",
    3: "Pull",
    4: "Shoulders & Arms",
  };

  const RUN_SCHEDULE = {
    3: "Interval session — 5km time work",
    5: "5km run",
    0: "Long run — 10km or half marathon",
  };

  const DEFAULT_EDITABLE = [
    {
      title: "Business",
      items: [
        "Work on marketing agency (client outreach / delivery / admin)",
        "One action toward getting a new client"
      ]
    },
    {
      title: "Focus & Discipline",
      items: [
        "Distractions blocked during deep work time",
        "No mindless scrolling before 12pm"
      ]
    },
    {
      title: "Learning",
      items: [
        "Read (global politics / non-fiction / any book)",
        "Swedish practice (Duolingo / flashcards / listening)"
      ]
    },
    {
      title: "Driving",
      items: ["Driving lesson or theory revision"]
    }
  ];

  let editMode = false;

  function getLockedSections() {
    const day = new Date().getDay();
    const locked = [];
    if (day !== 5 && day !== 6) {
      locked.push({
        locked: true,
        title: "Gym & Training",
        items: [`Gym — ${GYM_SCHEDULE[day] || "Session"}`, "Daily ab workout"]
      });
    }
    const run = RUN_SCHEDULE[day];
    if (run) {
      locked.push({ locked: true, title: "Running", items: [`Run — ${run}`] });
    }
    return locked;
  }

  function loadEditable() {
    const saved = localStorage.getItem('editable-sections');
    return saved ? JSON.parse(saved) : DEFAULT_EDITABLE;
  }

  function saveEditable(sections) {
    localStorage.setItem('editable-sections', JSON.stringify(sections));
  }

  function getAllSections() {
    return [...getLockedSections(), ...loadEditable()];
  }

  const todayKey = () => new Date().toISOString().slice(0, 10);

  function loadState() {
    const saved = localStorage.getItem('daily-' + todayKey());
    return saved ? JSON.parse(saved) : {};
  }

  function saveState(state) {
    localStorage.setItem('daily-' + todayKey(), JSON.stringify(state));
  }

  function updateProgress() {
    const sections = getAllSections();
    const allItems = sections.flatMap(s => s.items);
    const state = loadState();
    const done = allItems.filter((_, i) => state[i]).length;
    const pct = allItems.length ? Math.round((done / allItems.length) * 100) : 0;
    document.getElementById('progress-bar').style.width = pct + '%';
    document.getElementById('progress-label').textContent = `${done} / ${allItems.length} done`;
  }

  function toggleEditMode() {
    editMode = !editMode;
    document.getElementById('checklist').classList.toggle('edit-mode', editMode);
    const btn = document.getElementById('edit-toggle');
    btn.textContent = editMode ? 'Done' : 'Edit';
    btn.classList.toggle('active', editMode);
  }

  function render() {
    const state = loadState();
    const container = document.getElementById('checklist');
    container.innerHTML = '';
    if (editMode) container.classList.add('edit-mode');

    const sections = getAllSections();
    let globalIndex = 0;

    sections.forEach((section, sectionIdx) => {
      const isLocked = !!section.locked;
      const editableSectionIdx = sectionIdx - getLockedSections().length;

      const sec = document.createElement('div');
      sec.className = 'section';

      const titleRow = document.createElement('div');
      titleRow.style.display = 'flex';
      titleRow.style.alignItems = 'center';
      titleRow.style.marginBottom = '8px';
      titleRow.style.paddingLeft = '4px';

      const titleEl = document.createElement('span');
      titleEl.className = 'section-title';
      titleEl.style.margin = '0';
      titleEl.textContent = section.title;
      titleRow.appendChild(titleEl);

      if (isLocked) {
        const badge = document.createElement('span');
        badge.className = 'lock-badge';
        badge.textContent = '🔒 locked';
        titleRow.appendChild(badge);
      }

      sec.appendChild(titleRow);

      const card = document.createElement('div');
      card.className = 'card';

      section.items.forEach((label, itemIdx) => {
        const idx = globalIndex++;
        const item = document.createElement('div');
        item.className = 'item' + (state[idx] ? ' done' : '');

        const checkbox = document.createElement('div');
        checkbox.className = 'checkbox';
        checkbox.innerHTML = '<span class="checkmark">✓</span>';

        const labelEl = document.createElement('div');
        labelEl.className = 'label';
        labelEl.textContent = label;

        item.appendChild(checkbox);
        item.appendChild(labelEl);

        if (!isLocked) {
          const editLbl = document.createElement('span');
          editLbl.className = 'edit-btn-label';
          editLbl.textContent = 'Edit';
          editLbl.addEventListener('click', (e) => {
            e.stopPropagation();
            const newText = prompt('Edit item:', label);
            if (newText && newText.trim()) {
              const editable = loadEditable();
              editable[editableSectionIdx].items[itemIdx] = newText.trim();
              saveEditable(editable);
              render();
            }
          });

          const delBtn = document.createElement('button');
          delBtn.className = 'delete-btn';
          delBtn.innerHTML = '&times;';
          delBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            if (confirm(`Remove "${label}"?`)) {
              const editable = loadEditable();
              editable[editableSectionIdx].items.splice(itemIdx, 1);
              saveEditable(editable);
              render();
            }
          });

          item.appendChild(editLbl);
          item.appendChild(delBtn);
        }

        item.addEventListener('click', () => {
          if (editMode && !isLocked) return;
          const s = loadState();
          s[idx] = !s[idx];
          saveState(s);
          render();
        });

        card.appendChild(item);
      });

      if (!isLocked) {
        const addRow = document.createElement('div');
        addRow.className = 'add-item-row';
        addRow.innerHTML = '<span style="font-size:20px;line-height:1;">+</span> Add item';
        addRow.addEventListener('click', () => {
          const newText = prompt('New item:');
          if (newText && newText.trim()) {
            const editable = loadEditable();
            editable[editableSectionIdx].items.push(newText.trim());
            saveEditable(editable);
            render();
          }
        });
        card.appendChild(addRow);
      }

      sec.appendChild(card);
      container.appendChild(sec);
    });

    updateProgress();
  }

  function resetDay() {
    if (confirm('Reset all checkboxes for today?')) {
      localStorage.removeItem('daily-' + todayKey());
      render();
    }
  }

  function setDateLabel() {
    const now = new Date();
    const options = { weekday: 'long', day: 'numeric', month: 'long' };
    document.getElementById('date-label').textContent = now.toLocaleDateString('en-GB', options);
  }

  setDateLabel();
  render();
</script>
</body>
</html>
